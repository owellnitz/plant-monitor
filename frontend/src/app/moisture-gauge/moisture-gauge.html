<div
  class="radial-progress shrink-0"
  [class.text-primary]="status() === 'ok'"
  [class.text-warning]="status() === 'can'"
  [class.text-error]="status() === 'must'"
  [class.text-base-content/30]="status() === null"
  [style.--size]="size()"
  [style.--thickness]="thickness()"
  [style.--value]="percent()"
  role="progressbar"
  [attr.aria-valuenow]="percent()"
>
  <ng-content />
</div>
