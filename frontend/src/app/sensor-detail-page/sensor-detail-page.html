<main class="mx-auto max-w-3xl space-y-4 p-5 sm:p-6">
  <nav class="rise">
    <a
      routerLink="/"
      class="inline-flex items-center gap-1 text-sm text-base-content/50 transition-colors hover:text-base-content"
    >
      <span aria-hidden="true">&larr;</span> All plants
    </a>
  </nav>

  @if (readings.status() === 'loading') {
    <app-loading minHeight="20rem" />
  } @else if (readings.status() === 'error') {
    <app-error-state message="Couldn’t load readings" />
  } @else if (latest(); as latest) {
    <section
      class="rise flex items-center gap-6 rounded-box bg-base-100 p-6 shadow-sm"
      style="animation-delay: 60ms"
    >
      <app-moisture-gauge [percent]="latest.percent" size="8rem" thickness="8px">
        <span class="font-display text-3xl font-semibold text-base-content">
          {{ latest.percent }}%
        </span>
      </app-moisture-gauge>
      <div class="min-w-0">
        <h2 class="font-display truncate text-2xl font-medium tracking-tight">
          {{ deviceId() }}
        </h2>
        <p class="mt-1 text-sm text-base-content/50">
          {{ latest.receivedAt | date: timeFormat }}
        </p>
      </div>
    </section>

    <app-readings-section [readings]="readings.value()" />
  } @else {
    <p class="rise rounded-box bg-base-100 px-6 py-14 text-center shadow-sm">
      <span class="block text-3xl">🪴</span>
      <span class="mt-3 block font-medium">No readings yet</span>
      <span class="mt-1 block text-sm text-base-content/50">{{ deviceId() }} hasn't reported</span>
    </p>
  }
</main>
