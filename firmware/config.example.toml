# Copy this file to config.toml and fill in your values, then write it to the
# device's config partition with ./provision.sh (run once per device).
# config.toml is gitignored; it holds the WiFi password.

wifi_ssid = "your-ssid"
wifi_password = "your-password"

# MQTT broker IPv4 address (no DNS resolution) and port.
mqtt_host = "192.168.1.10"
mqtt_port = "1883"
