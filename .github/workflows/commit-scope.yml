name: Commit scope

# release-please attributes a commit to every package whose files it
# touches (exclude-paths filters files, not commits). A (firmware)
# commit that also touches files outside firmware/ therefore counts for
# the app release too — with a breaking-change footer it would
# major-bump the app. Keep firmware commits strictly inside firmware/;
# root docs belong in a separate commit (see docs/releasing.md).
on:
  pull_request:

jobs:
  firmware-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Firmware commits touch only firmware/
        run: |
          bad=0
          for sha in $(git rev-list origin/${{ github.base_ref }}..HEAD --no-merges); do
            subject=$(git log -1 --format=%s "$sha")
            case "$subject" in
              *"(firmware)"*)
                outside=$(git diff-tree --no-commit-id --name-only -r "$sha" | grep -v '^firmware/' || true)
                if [ -n "$outside" ]; then
                  echo "::error::commit $sha \"$subject\" touches files outside firmware/:"
                  echo "$outside"
                  bad=1
                fi
                ;;
            esac
          done
          exit $bad
