name: Publish

# Builds and publishes the deployable image (backend + frontend).
# On main, the affected test workflows run first and gate the publish;
# tests for unchanged parts are skipped.
on:
  push:
    branches: [main]
    paths:
      # The image bundles the frontend, so frontend changes rebuild it too.
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend.yml"
      - ".github/workflows/frontend.yml"
      - ".github/workflows/publish.yml"
  # PRs validate the Dockerfile with a build-only run; frontend-only
  # PRs skip this since they can't break the image build. Tests on PRs
  # run via the backend/frontend workflows' own pull_request triggers.
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/publish.yml"

jobs:
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - ".github/workflows/backend.yml"
            frontend:
              - "frontend/**"
              - ".github/workflows/frontend.yml"

  backend-tests:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/backend.yml

  frontend-tests:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend.yml

  image:
    needs: [backend-tests, frontend-tests]
    # Run when no needed job failed or was cancelled; skipped test jobs
    # (unchanged part, or a PR build) don't block the image.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Build container image
        run: >
          docker build -f backend/Dockerfile .
          -t ghcr.io/${{ github.repository }}/backend:latest
          -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      # Only pushes to main reach the registry; PRs just build.
      - name: Push to GHCR
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push --all-tags ghcr.io/${{ github.repository }}/backend
