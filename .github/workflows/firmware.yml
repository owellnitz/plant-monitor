name: Firmware

on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/firmware.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  firmware:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v6

      # WiFi/MQTT settings are baked in at build time from config.toml
      # (gitignored); CI builds with the example values.
      - run: cp config.example.toml config.toml

      # rustup picks up rust-toolchain.toml (stable + riscv32imc target)
      # on the first cargo invocation.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware

      - name: Build firmware (default features)
        run: cargo build --release

      - name: Build firmware (net)
        run: cargo build --release --features net

      # .cargo/config.toml defaults the target to riscv32imc, so the
      # host-run lib tests need the host target spelled out.
      - name: Host tests
        run: cargo test --lib --target x86_64-unknown-linux-gnu
