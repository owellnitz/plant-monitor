name: Frontend

# Tests and build only — the deployable image (backend + frontend) is
# built elsewhere. On main, this workflow is called by the image and
# release workflows so the image is only built/published when the tests
# pass.
on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Format check
        run: npx prettier --check src

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
