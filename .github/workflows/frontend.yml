name: Frontend

# Tests and build only — the deployable image (backend + frontend) is
# built by the backend workflow.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
