name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Format check
        run: dotnet format PlantMonitor.Backend.slnx --verify-no-changes

      # Integration tests use Testcontainers; the ubuntu runners ship
      # with a running Docker daemon.
      - name: Tests
        run: dotnet test
