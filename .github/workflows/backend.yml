name: Backend

on:
  push:
    branches: [main]
    paths:
      # The image bundles the frontend, so frontend changes rebuild it too.
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Format check
        run: dotnet format PlantMonitor.Backend.slnx --verify-no-changes

      # Integration tests use Testcontainers; the ubuntu runners ship
      # with a running Docker daemon.
      - name: Tests
        run: dotnet test

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Build container image
        run: >
          docker build -f backend/Dockerfile .
          -t ghcr.io/${{ github.repository }}/backend:latest
          -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      # Only pushes to main reach the registry; PRs just build.
      - name: Push to GHCR
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push --all-tags ghcr.io/${{ github.repository }}/backend
