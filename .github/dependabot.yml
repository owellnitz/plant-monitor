version: 2
updates:
  - package-ecosystem: cargo
    directory: "/firmware"
    schedule:
      interval: weekly
    # The ESP stack must move in lockstep with esp-hal (see "Version
    # pinning" in the README) — those bumps are manual.
    ignore:
      - dependency-name: "esp-hal"
      - dependency-name: "esp-hal-smartled"
      - dependency-name: "esp-bootloader-esp-idf"
      - dependency-name: "esp-radio"
      - dependency-name: "esp-rtos"
      - dependency-name: "esp-alloc"
      - dependency-name: "esp32c3"
      - dependency-name: "smoltcp"
      # blocking-network-stack (git-pinned) implements the embedded-io 0.6
      # traits — bumping past 0.6 breaks the net build.
      - dependency-name: "embedded-io"

  - package-ecosystem: nuget
    directory: "/backend"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    groups:
      # Angular packages (core, CLI, build) must be bumped in lockstep.
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Images use major-version tags only — just surface major bumps.
  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
