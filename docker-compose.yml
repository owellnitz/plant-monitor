services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # Web UI for inspecting MQTT topics. Connects to the broker server-side
  # over the compose network (host "mqtt", port 1883); the connection is
  # configured once in the UI and persisted in the volume.
  mqtt-explorer:
    image: smeagolworms4/mqtt-explorer
    ports:
      - "4000:4000"
    volumes:
      - mqtt-explorer-config:/mqtt-explorer/config
    depends_on:
      - mqtt
    restart: unless-stopped

  db:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: plantmonitor
      POSTGRES_USER: plantmonitor
      # From .env (gitignored) — see .env.example. Only set on first
      # init of the volume; change it later via ALTER USER, not here.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantmonitor"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # MQTT -> Postgres ingest + REST API + serves the frontend.
  # Context is the repo root so the image can build the Angular app too.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      # 5001 because macOS AirPlay Receiver squats on 5000.
      - "5001:8080"
    environment:
      Mqtt__Host: mqtt
      ConnectionStrings__Db: Host=db;Username=plantmonitor;Password=${POSTGRES_PASSWORD:?set in .env};Database=plantmonitor
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    restart: unless-stopped

volumes:
  mqtt-explorer-config:
  postgres-data:
